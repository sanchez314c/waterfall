<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jason Paul Michaels — Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a0a0a;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      scrollbar-width: none;
    }
    html::-webkit-scrollbar { display: none; }

    /* Waterfall masonry grid */
    #grid {
      column-count: 4;
      column-gap: 4px;
      padding: 4px;
      max-width: 100vw;
    }

    .photo {
      break-inside: avoid;
      margin-bottom: 4px;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .photo.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .photo img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .photo:hover img {
      transform: scale(1.03);
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }
    #lightbox.active { display: flex; }
    #lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    /* Auto-scroll controls */
    #controls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 500;
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    body:hover #controls { opacity: 1; }

    #controls button {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    #controls button:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    #controls button.active {
      background: rgba(255,255,255,0.25);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
    }

    /* Mobile: controls always visible, larger touch targets */
    @media (hover: none) and (pointer: coarse) {
      #controls {
        opacity: 0.7;
        bottom: env(safe-area-inset-bottom, 16px);
        right: 16px;
      }
      #controls button {
        padding: 14px 20px;
        font-size: 16px;
        min-height: 48px;
        min-width: 48px;
      }
      .photo:hover img { transform: none; }
    }

    /* Loading indicator */
    #loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #444;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 100;
    }

    /* Responsive columns */
    @media (max-width: 1400px) { #grid { column-count: 3; } }
    @media (max-width: 900px)  { #grid { column-count: 2; } }
    @media (max-width: 500px)  { #grid { column-count: 1; column-gap: 0; padding: 0; } .photo { margin-bottom: 2px; border-radius: 0; } }
  </style>
</head>
<body>

  <div id="loader">Loading...</div>
  <div id="grid"></div>

  <div id="lightbox">
    <img id="lb-img" src="" alt="">
  </div>

  <div id="controls">
    <button id="btn-scroll" title="Toggle auto-scroll">Scroll</button>
    <button id="btn-speed" title="Change speed">1x</button>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const loader = document.getElementById('loader');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const btnScroll = document.getElementById('btn-scroll');
    const btnSpeed = document.getElementById('btn-speed');

    let autoScroll = true;
    let scrollSpeed = 1; // px per frame
    const speeds = [0.5, 1, 2, 3];
    let speedIdx = 1;
    let scrollRAF = null;
    let userInteracted = false;
    let interactTimeout = null;

    // Fetch and render images
    async function init() {
      const res = await fetch('/api/images');
      const images = await res.json();
      loader.style.display = 'none';

      // Create all photo elements
      const fragment = document.createDocumentFragment();
      images.forEach((img, i) => {
        const div = document.createElement('div');
        div.className = 'photo';

        const imgEl = document.createElement('img');
        imgEl.loading = 'lazy';
        imgEl.src = img.thumb;
        imgEl.alt = img.name;
        imgEl.dataset.full = img.full;

        imgEl.addEventListener('click', (e) => {
          e.stopPropagation();
          openLightbox(img.full);
        });

        div.appendChild(imgEl);
        fragment.appendChild(div);
      });

      grid.appendChild(fragment);

      // Intersection observer for fade-in
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '100px' });

      document.querySelectorAll('.photo').forEach(p => observer.observe(p));

      // Start auto-scroll after a brief pause
      setTimeout(() => {
        if (autoScroll) startAutoScroll();
      }, 2000);
    }

    // Auto-scroll
    function startAutoScroll() {
      btnScroll.classList.add('active');
      function step() {
        if (!userInteracted) {
          window.scrollBy(0, scrollSpeed);
        }
        // Loop back to top when reaching bottom
        if ((window.innerHeight + window.scrollY) >= document.body.scrollHeight - 10) {
          window.scrollTo(0, 0);
        }
        scrollRAF = requestAnimationFrame(step);
      }
      scrollRAF = requestAnimationFrame(step);
    }

    function stopAutoScroll() {
      if (scrollRAF) cancelAnimationFrame(scrollRAF);
      scrollRAF = null;
      btnScroll.classList.remove('active');
    }

    // Pause auto-scroll on user interaction, resume after 3s
    function onUserInteract() {
      userInteracted = true;
      clearTimeout(interactTimeout);
      interactTimeout = setTimeout(() => {
        userInteracted = false;
      }, 3000);
    }

    // On touch devices, disable auto-scroll entirely - let them swipe naturally
    const isTouchDevice = matchMedia('(hover: none) and (pointer: coarse)').matches;
    if (isTouchDevice) {
      autoScroll = false;
    }

    window.addEventListener('wheel', onUserInteract, { passive: true });
    window.addEventListener('touchstart', onUserInteract, { passive: true });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('active')) {
        closeLightbox();
      } else {
        onUserInteract();
      }
    });

    // Swipe down on lightbox to dismiss (mobile)
    let touchStartY = 0;
    lightbox.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    lightbox.addEventListener('touchend', (e) => {
      const deltaY = e.changedTouches[0].clientY - touchStartY;
      if (deltaY > 80) closeLightbox(); // swipe down > 80px
    });

    // Controls
    btnScroll.addEventListener('click', () => {
      autoScroll = !autoScroll;
      if (autoScroll) {
        startAutoScroll();
      } else {
        stopAutoScroll();
      }
    });

    // Update button state on load for touch devices
    if (isTouchDevice) btnScroll.classList.remove('active');

    btnSpeed.addEventListener('click', () => {
      speedIdx = (speedIdx + 1) % speeds.length;
      scrollSpeed = speeds[speedIdx];
      btnSpeed.textContent = speeds[speedIdx] + 'x';
    });

    // Lightbox
    function openLightbox(src) {
      lbImg.src = src;
      lightbox.classList.add('active');
      if (autoScroll) stopAutoScroll();
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      lbImg.src = '';
      if (autoScroll) startAutoScroll();
    }

    lightbox.addEventListener('click', closeLightbox);

    init();
  </script>
</body>
</html>
